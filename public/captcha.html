<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZCode 验证中心</title>
  <!-- 引入 Premium 字体 Outfit 和 Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #09090b 0%, #111115 50%, #1e1b4b 100%);
      --accent-color: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.5);
      --success-color: #10b981;
      --success-glow: rgba(16, 185, 129, 0.5);
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f4f4f5;
      --text-muted: #a1a1aa;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-main);
      overflow: hidden;
      position: relative;
    }

    /* 背景流光动画效果 */
    body::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      top: -10%;
      left: -10%;
      z-index: 0;
      opacity: 0.6;
      animation: pulseOrbit 12s infinite alternate ease-in-out;
    }

    body::after {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(147, 51, 234, 0.3) 0%, transparent 70%);
      bottom: -15%;
      right: -10%;
      z-index: 0;
      opacity: 0.5;
      animation: pulseOrbit 16s infinite alternate-reverse ease-in-out;
    }

    @keyframes pulseOrbit {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 80px) scale(1.1); }
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 460px;
      padding: 24px;
    }

    /* 磨砂玻璃质感卡片 */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    /* 顶部流光条 */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #6366f1, #a855f7, #6366f1);
      background-size: 200% 100%;
      animation: flowStream 4s linear infinite;
    }

    @keyframes flowStream {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    .card.success-state {
      border-color: rgba(16, 185, 129, 0.3);
      box-shadow: 0 0 40px rgba(16, 185, 129, 0.15);
    }

    .card.success-state::before {
      background: var(--success-color);
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      background: linear-gradient(120deg, #ffffff 40%, #c7d2fe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* 验证组件加载区 */
    #captcha-container {
      min-height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
      position: relative;
    }

    /* 隐藏的辅助按钮，用于触发滑块配置中可能指定的按钮元素 */
    #captcha-trigger-btn {
      display: none;
    }

    /* 加载状态指示器 */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transition: opacity 0.3s ease;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.05);
      border-top-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 1s infinite linear;
      box-shadow: 0 0 15px var(--accent-glow);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* 成功动画 */
    .success-icon-wrapper {
      display: none;
      justify-content: center;
      align-items: center;
      margin: 20px auto 30px;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
      animation: scaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes scaleUp {
      0% { transform: scale(0.6); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .success-svg {
      width: 36px;
      height: 36px;
      stroke: var(--success-color);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: drawCheck 0.8s 0.2s ease-in-out forwards;
    }

    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    .hidden {
      display: none !important;
    }

    .fade-out {
      opacity: 0;
      pointer-events: none;
    }
  </style>
  <script src="https://o.alicdn.com/captcha-frontend/aliyunCaptcha/AliyunCaptcha.js"></script>
</head>
<body>

  <div class="container">
    <div class="card" id="card">
      <div id="verify-section">
        <h1 id="title-text">安全验证</h1>
        <p class="subtitle" id="subtitle-text">对话请求需要完成人机验证以继续</p>
        
        <div id="captcha-container">
          <!-- 默认加载动效 -->
          <div class="loader" id="loader">
            <div class="spinner"></div>
            <p style="font-size: 13px; color: var(--text-muted)">正在初始化无痕安全验证...</p>
          </div>
          <!-- 阿里验证渲染节点 -->
          <div id="captcha-div"></div>
        </div>
        
        <!-- 假按钮，用于触发阿里验证的 element/button 机制 -->
        <button id="captcha-trigger-btn"></button>
      </div>

      <!-- 成功展示区块 -->
      <div class="success-icon-wrapper" id="success-wrapper">
        <svg class="success-svg" viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
    </div>
  </div>

  <script>
    // 从后端动态获取配置并加载滑块
    async function initVerification() {
      const card = document.getElementById('card');
      const loader = document.getElementById('loader');
      const verifySection = document.getElementById('verify-section');
      const successWrapper = document.getElementById('success-wrapper');
      const titleText = document.getElementById('title-text');
      const subtitleText = document.getElementById('subtitle-text');

      // 重置 UI 状态
      verifySection.classList.remove('hidden');
      successWrapper.style.display = 'none';
      card.classList.remove('success-state');
      // 清除之前动态添加的成功文字
      card.querySelectorAll('.dynamic-success').forEach(el => el.remove());

      try {
        // 1. 获取后端 Captcha 配置
        const res = await fetch('/api/captcha/config');
        if (!res.ok) throw new Error('无法获取验证码配置');
        const config = await res.json();

        if (!config.enabled) {
          loader.innerHTML = '<p style="color: var(--success-color)">安全验证已关闭，即将自动返回。</p>';
          return;
        }

        // 2. 初始化阿里 Captcha SDK
        if (typeof window.initAliyunCaptcha !== 'function') {
          throw new Error('阿里人机识别 SDK 未能成功加载，请检查网络');
        }

        window.initAliyunCaptcha({
          SceneId: config.sceneId,
          mode: 'popup',
          region: config.region,
          prefix: config.prefix,
          element: '#captcha-div',
          button: '#captcha-trigger-btn',
          captchaLogoImg: '',
          showErrorTip: false,
          getInstance: (instance) => {
            console.log('[Captcha] 阿里 SDK 实例化成功');
            window.__captchaInstance = instance;
            loader.classList.add('hidden');

            // 立即启动无痕验证
            if (typeof instance.startTracelessVerification === 'function') {
              console.log('[Captcha] 执行无痕静默验证...');
              instance.startTracelessVerification();
            } else if (typeof instance.show === 'function') {
              instance.show();
            } else {
              document.getElementById('captcha-trigger-btn').click();
            }
          },
          success: async (verifyParam) => {
            console.log('[Captcha] 验证参数获取成功:', verifyParam.length);

            // 隐藏验证区块，显示成功动效
            verifySection.classList.add('hidden');
            successWrapper.style.display = 'flex';
            card.classList.add('success-state');

            const successTitle = document.createElement('h1');
            successTitle.className = 'dynamic-success';
            successTitle.innerText = '验证成功';
            successTitle.style.marginTop = '16px';

            const successSub = document.createElement('p');
            successSub.className = 'subtitle dynamic-success';
            successSub.innerText = '凭证已回传，等待下次验证...';
            successSub.style.marginBottom = '0';

            card.appendChild(successTitle);
            card.appendChild(successSub);

            // 回传给后端
            try {
              await fetch('/api/captcha/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ verifyParam })
              });
              console.log('[Captcha] 回传后端成功');
            } catch (err) {
              console.error('[Captcha] 回传失败:', err);
            }
            // 不关闭页面 — 保持常驻，等 __resetCaptcha 重用
          },
          fail: (err) => {
            console.error('[Captcha] 验证码验证失败:', err);
            loader.innerHTML = '<p style="color: #ef4444; font-size: 13px;">验证失败，等待重置...</p>';
            loader.classList.remove('hidden');
          },
          onError: (err) => {
            console.error('[Captcha] 验证码出错:', err);
            loader.innerHTML = '<p style="color: #ef4444; font-size: 13px;">加载出错，等待重置...</p>';
            loader.classList.remove('hidden');
          }
        });

      } catch (error) {
        console.error('[Captcha] 初始化异常:', error);
        loader.innerHTML = `<p style="color: #ef4444; font-size: 13px;">${error.message}</p>`;
      }
    }

    /**
     * 重置验证 — 由 Playwright page.evaluate() 调用
     * 销毁当前 SDK 实例，重新初始化
     */
    window.__resetCaptcha = async function() {
      console.log('[Captcha] 收到重置指令');
      try {
        if (window.__captchaInstance && typeof window.__captchaInstance.destroy === 'function') {
          window.__captchaInstance.destroy();
        }
      } catch (e) {
        console.warn('[Captcha] destroy 失败:', e);
      }
      window.__captchaInstance = null;
      document.getElementById('captcha-div').innerHTML = '';
      await initVerification();
    };

    window.addEventListener('DOMContentLoaded', initVerification);
  </script>
</body>
</html>
